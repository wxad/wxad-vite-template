name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: pr-preview-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    # Fork PR 默认没有写权限，避免失败
    if: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build preview
        run: pnpm run demo

      - name: Deploy preview to gh-pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          branch: gh-pages
          folder: docs
          target-folder: previews/pr-${{ github.event.pull_request.number }}
          clean: false

      - name: Comment preview link
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            let pagesBaseUrl = "";
            try {
              const { data: pages } = await github.rest.repos.getPages({ owner, repo });
              pagesBaseUrl = (pages.html_url || "").replace(/\/$/, "");
            } catch (error) {
              const isUserPageRepo = repo.toLowerCase() === `${owner.toLowerCase()}.github.io`;
              pagesBaseUrl = isUserPageRepo
                ? `https://${owner}.github.io`
                : `https://${owner}.github.io/${repo}`;
            }
            const previewUrl = `${pagesBaseUrl}/previews/pr-${prNumber}/`;

            const marker = "<!-- pr-preview-link -->";
            const body = `${marker}
            🔍 PR 预览链接：${previewUrl}

            > 每次 push 到该 PR，预览内容会自动更新。`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const existing = comments.find(
              (comment) =>
                comment.user?.type === "Bot" &&
                typeof comment.body === "string" &&
                comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
